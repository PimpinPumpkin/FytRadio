name: Build

# Sanity build on every push / PR to main so breakage is caught before tagging a release.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug
