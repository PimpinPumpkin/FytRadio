name: Release

# Build a signed release APK and publish it to a GitHub Release whenever a version
# tag (vX.Y.Z) is pushed. Can also be run manually with an explicit tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build & release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VNAME="${TAG#v}"
          IFS='.' read -r MAJ MIN PAT <<< "$VNAME"
          VCODE=$(( ${MAJ:-0} * 10000 + ${MIN:-0} * 100 + ${PAT:-0} ))
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "name=$VNAME"  >> "$GITHUB_OUTPUT"
          echo "code=$VCODE"  >> "$GITHUB_OUTPUT"
          echo "Building $TAG -> versionName=$VNAME versionCode=$VCODE"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease \
            -PversionName=${{ steps.ver.outputs.name }} \
            -PversionCode=${{ steps.ver.outputs.code }}

      - name: Stage APK
        run: cp app/build/outputs/apk/release/app-release.apk "FytRadio-${{ steps.ver.outputs.name }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: FytRadio ${{ steps.ver.outputs.name }}
          generate_release_notes: true
          files: FytRadio-${{ steps.ver.outputs.name }}.apk
          body: |
            Signed release APK for the 768×1024 vertical FYT (UIS7870/7862) head unit.

            **Install / update:** copy the APK to the unit and install it. Updates install
            in place over a previous **release** build (same signing key). If you currently
            have a debug build installed, uninstall it once before installing this signed
            release — after that, future releases upgrade in place.
